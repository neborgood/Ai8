<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebLLM Chat (Built-In Stable)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root {
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #007acc;
            --user-msg: #2b2b2b;
            --ai-msg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        #status-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #status {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #progress-bar-container {
            width: 80%;
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            display: block;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.1s linear;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        .user {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }

        .thinking-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #input-container {
            display: flex;
            padding: 15px;
            background-color: var(--chat-bg);
            border-top: 1px solid #333;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 20px;
            color: #fff;
            padding: 10px 15px;
            resize: none;
            height: 24px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        #debug-panel {
            background-color: #1e1111;
            border-top: 2px solid #ff4444;
            color: #ff9999;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 120px;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        Local Private AI (Built-In Stable)
        <div id="status-container">
            <div id="status">Starting WebGPU...</div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai">Hi! Let's get this working. This setup uses a natively supported, fully stable built-in model to prevent setup crashes.</div>
    </div>

    <div id="input-container">
        <textarea id="user-input" placeholder="Initializing engine..." disabled></textarea>
        <button id="send-btn" disabled>➔</button>
    </div>

    <div id="debug-panel"><strong>System Log:</strong><br></div>

    <script type="module">
        import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";

        const statusDiv = document.getElementById("status");
        const progressBar = document.getElementById("progress-bar");
        const progressBarContainer = document.getElementById("progress-bar-container");
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const debugPanel = document.getElementById("debug-panel");

        // Using WebLLM's official tiny model for stable loads
        const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC";
        let engine;

        function logDebug(message) {
            console.log(message);
            debugPanel.style.display = "block";
            debugPanel.innerHTML += `> ${message}<br>`;
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }

        async function initEngine() {
            try {
                if (!navigator.gpu) {
                    throw new Error("WebGPU is not supported on this browser.");
                }

                statusDiv.innerText = "Downloading model weights...";
                logDebug(`Loading built-in model: ${selectedModel}`);

                const initProgressCallback = (report) => {
                    statusDiv.innerText = report.text;
                    const percent = Math.round(report.progress * 100);
                    progressBar.style.width = `${percent}%`;
                };

                // Safely modify the appConfig object properties to ensure compatibility
                const finalConfig = prebuiltAppConfig;
                finalConfig.useIndexedDBCache = true;

                // Launch engine with stable built-in configuration
                engine = await CreateMLCEngine(selectedModel, {
                    initProgressCallback,
                    appConfig: finalConfig
                });

                statusDiv.innerText = "Model Ready! (Offline Mode)";
                progressBarContainer.style.display = "none";
                userInput.placeholder = "Type a message...";
                userInput.disabled = false;
                sendBtn.disabled = false;
                logDebug("Engine initialized successfully!");
            } catch (err) {
                statusDiv.innerText = "Initialization failed.";
                progressBar.style.backgroundColor = "#ff3333";
                logDebug(`CRITICAL ERROR: ${err.message || err}`);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiMessageElement = appendMessage("", "ai");
            aiMessageElement.innerHTML = `<span class="thinking-indicator"></span>Compiling...`;

            try {
                const messages = [{ role: "user", content: text }];
                logDebug("Submitting query...");

                const reply = await engine.chat.completions.create({
                    messages,
                    stream: true
                });

                let responseText = "";
                for await (const chunk of reply) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    responseText += delta;
                    
                    if (responseText.length > 0) {
                        aiMessageElement.innerText = responseText;
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                logDebug("Done generating.");
            } catch (error) {
                aiMessageElement.innerText = "Error during generation.";
                logDebug(`GENERATION ERROR: ${error.message || error}`);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(text, sender) {
            const msg = document.createElement("div");
            msg.classList.add("message", sender);
            msg.innerText = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        initEngine();
    </script>
</body>
</html>
